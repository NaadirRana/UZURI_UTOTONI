<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Uzuri Utotoni | Dashboard</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<div class="brand">UZURI UTOTONI</div>
			<ul class="nav-links">
				<li><a class="active" href="dashboard.html">Dashboard</a></li>
				<li><a href="feeding-log.html">Feeding Log</a></li>
				<li><a href="view-infants.html">View Infants</a></li>
			</ul>
		</aside>

		<main class="main">
			<h1 class="page-title">Dashboard</h1>
			<p class="page-subtitle">Infant registration and care management</p>

			<section class="card">
				<h2>Infant Registration</h2>
				<form action="#" method="post" data-endpoint="/api/infants">
					<div class="form-grid">
						<div class="field">
							<label for="parent_id">Parent ID</label>
							<input type="number" id="parent_id" name="parent_id" required />
						</div>

						<div class="field">
							<label for="full_name">Full Name</label>
							<input type="text" id="full_name" name="full_name" required />
						</div>

						<div class="field">
							<label for="gender">Gender</label>
							<select id="gender" name="gender" required>
								<option value="" disabled selected>Select gender</option>
								<option value="Male">Male</option>
								<option value="Female">Female</option>
							</select>
						</div>

						<div class="field">
							<label for="date_of_birth">Date of Birth</label>
							<input type="date" id="date_of_birth" name="date_of_birth" required />
						</div>

						<div class="field">
							<label for="birth_weight">Birth Weight</label>
							<input type="number" step="0.01" id="birth_weight" name="birth_weight" required />
						</div>

						<div class="field">
							<label for="blood_group">Blood Group</label>
							<input type="text" id="blood_group" name="blood_group" required />
						</div>
					</div>

					<div class="actions">
						<button type="submit" class="btn">Register Infant</button>
					</div>
				</form>
				<p class="page-subtitle" style="margin-top: 14px; margin-bottom: 0;">Frontend note: submit is placeholder only. Backend team should connect this form to <strong>/api/infants</strong>.</p>
			</section>
		</main>
	</div>
	<script src="frontend-submit-placeholder.js"></script>
</body>
</html>
