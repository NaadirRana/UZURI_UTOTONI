<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Uzuri Utotoni | Login</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
	<main class="auth-card" aria-labelledby="login-title">
		<div class="brand">UZURI UTOTONI</div>
		<h1 id="login-title">Portal Login</h1>
		<p class="subtitle">Secure access for registered medical and parent accounts.</p>

		<form action="login_process.php" method="POST" class="form-grid">
			<div class="field">
				<label for="role">User Role</label>
				<select id="role" name="role" required>
					<option value="" disabled selected>Select role</option>
					<option value="parent">Parent / Guardian</option>
					<option value="nurse">Nurse</option>
					<option value="doctor">Doctor</option>
					<option value="administrator">System Administrator</option>
				</select>
			</div>

			<div class="field">
				<label for="email">Email Address</label>
				<input type="email" id="email" name="email" autocomplete="username" autocapitalize="off" spellcheck="false" required />
			</div>

			<div class="field">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" autocomplete="current-password" minlength="8" required />
			</div>

			<button type="submit">Login to Portal</button>
		</form>

		<p class="register-link-wrap">New parent? <a href="register-parent.html">Create an account here</a></p>
	</main>
</body>
</html>
