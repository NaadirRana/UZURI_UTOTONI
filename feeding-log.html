<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Uzuri Utotoni | Feeding Log</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<div class="brand">UZURI UTOTONI</div>
			<ul class="nav-links">
				<li><a href="dashboard.html">Dashboard</a></li>
				<li><a href="feeding-log.html" class="active">Feeding Log</a></li>
				<li><a href="view-infants.html">View Infants</a></li>
			</ul>
		</aside>

		<main class="main">
			<h1 class="page-title">Feeding Log</h1>
			<p class="page-subtitle">Record and track infant feeding sessions</p>

			<section class="card">
				<h2>Add Feeding Record</h2>
				<form action="#" method="POST" data-endpoint="/api/feeding-logs">
					<div class="form-grid">
					<div class="field">
						<label for="infant_id">Infant ID</label>
						<input type="number" id="infant_id" name="infant_id" required />
					</div>

					<div class="field">
						<label for="nurse_id">Nurse ID</label>
						<input type="number" id="nurse_id" name="nurse_id" required />
					</div>

					<div class="field">
						<label for="feeding_time">Feeding Time</label>
						<input type="datetime-local" id="feeding_time" name="feeding_time" required />
					</div>

					<div class="field full">
						<label for="feeding_notes">Feeding Notes</label>
						<textarea id="feeding_notes" name="feeding_notes" placeholder="Enter notes..."></textarea>
					</div>
					</div>

					<div class="actions">
						<button type="submit" class="btn">Save Feeding Log</button>
					</div>
				</form>
				<p class="page-subtitle" style="margin-top: 14px; margin-bottom: 0;">Frontend note: submit is placeholder only. Backend team should connect this form to <strong>/api/feeding-logs</strong>.</p>
			</section>
		</main>
	</div>
	<script src="frontend-submit-placeholder.js"></script>
</body>
</html>
